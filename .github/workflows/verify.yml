---
name: verify

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: articulate/actions-markdownlint@v1

  golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.x"
      - name: Install dependencies
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          only-new-issues: false
          working-directory: .

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: go mod download
      - id: split
        run: |
          MATRIX=$(go run ./tools/cmd/split_test_groups)
          echo "Discovered matrix:"
          echo "$MATRIX"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  tests:
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    name: tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        env:
          IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX }}
        run: |
          go test -v -race -timeout=${{ matrix.timeout_minutes }}m ${{ matrix.packages }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: go mod download
      - name: Test with the Go CLI
        run: go build ./...
