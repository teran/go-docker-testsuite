---
name: verify

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: articulate/actions-markdownlint@v1

  golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.x"
      - name: Install dependencies
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          only-new-issues: false
          working-directory: .

  unittests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: go mod download
      - name: Test with the Go CLI
        run: go test -v -p 1 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: go mod download
      - name: Run tests with coverage
        env:
          IMAGE_PREFIX: ${{ vars.IMAGE_PREFIX }}
        run: |
          go test -coverprofile=coverage.out -covermode=count -timeout=30m ./...
      - name: Check coverage threshold
        env:
          THRESHOLD: 85
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          if (( $(echo "${total} < ${THRESHOLD}" | bc -l) )); then
            echo "❌ Coverage ${total}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "✅ Coverage ${total}% meets threshold ${THRESHOLD}%"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: go mod download
      - name: Test with the Go CLI
        run: go build ./...
